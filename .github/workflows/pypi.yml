name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Existing version to publish (for example: 1.5.0)'
        required: true
        type: string

jobs:
  build:
    name: Build and verify distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Resolve release version and ref
        id: release
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          VERSION=${INPUT_VERSION#v}
          REF="v$VERSION"

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid release version: $VERSION"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - name: Check out immutable release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release.outputs.ref }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: pip

      - name: Verify version consistency
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          PYPROJECT_VERSION=$(sed -n 's/^version = "\([^"]*\)"/\1/p' pyproject.toml)
          RUNTIME_VERSION=$(sed -n 's/^VERSION = "\([^"]*\)"/\1/p' src/scrolllock_led_daemon.py)
          DEBIAN_VERSION=$(dpkg-parsechangelog -l debian/changelog -S Version | sed 's/-[^-]*$//')

          printf 'Release tag:      %s\n' "$RELEASE_VERSION"
          printf 'pyproject.toml:   %s\n' "$PYPROJECT_VERSION"
          printf 'Runtime:          %s\n' "$RUNTIME_VERSION"
          printf 'debian/changelog: %s\n' "$DEBIAN_VERSION"

          if [ "$PYPROJECT_VERSION" != "$RELEASE_VERSION" ] || \
             [ "$RUNTIME_VERSION" != "$RELEASE_VERSION" ] || \
             [ "$DEBIAN_VERSION" != "$RELEASE_VERSION" ]; then
            echo '::error::Release versions are inconsistent.'
            exit 1
          fi

      - name: Install build and test dependencies
        run: python -m pip install --upgrade '.[test]' build twine

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Build distributions
        run: python -m build

      - name: Validate distributions
        run: python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: python-distributions-${{ steps.release.outputs.version }}
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish distributions to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/scrolllock-led-daemon/
    permissions:
      contents: read

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          pattern: python-distributions-*
          path: dist/
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
