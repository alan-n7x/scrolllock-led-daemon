name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential debhelper dh-python python3-all python3-setuptools dh-sequence-bash-completion devscripts

      - name: Build PyPI package
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        if: env.PYPI_TOKEN != ''
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

      - name: Build .deb package (binary)
        run: |
          dpkg-buildpackage -us -uc -b -d

      - name: Build Debian source package (unsigned)
        run: |
          dpkg-buildpackage -S -sa -us -uc -d
        continue-on-error: true

      - name: Import GPG key for signing
        if: env.GPG_PRIVATE_KEY != ''
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --yes --import
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          gpgconf --kill gpg-agent || true
          gpg --list-secret-keys --keyid-format LONG

      - name: Build signed Debian source package
        if: env.GPG_PRIVATE_KEY != '' && env.LAUNCHPAD_KEY != ''
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          LAUNCHPAD_KEY: ${{ secrets.LAUNCHPAD_SSH_KEY }}
          DEBEMAIL: "alan.profissional.dev@gmail.com"
          DEBFULLNAME: "Alan Santos"
        run: |
          rm -f ../scrolllock-led-daemon_*.dsc ../scrolllock-led-daemon_*.changes ../scrolllock-led-daemon_*.buildinfo ../scrolllock-led-daemon_*.orig.tar.*
          VERSION=$(dpkg-parsechangelog -SVersion | sed 's/-.*//')
          cd ..
          tar --exclude-vcs --exclude='scrolllock-led-daemon/debian' \
            --transform "s,^scrolllock-led-daemon,scrolllock-led-daemon-${VERSION}," \
            -czf "scrolllock-led-daemon_${VERSION}.orig.tar.gz" \
            scrolllock-led-daemon
          cd scrolllock-led-daemon
          printf '%s\n' '#!/usr/bin/env bash' \
            'if [ -n "$GPG_PASSPHRASE" ]; then' \
            '  exec gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" "$@"' \
            'else' \
            '  exec gpg --batch --yes --pinentry-mode loopback "$@"' \
            'fi' \
            > "$HOME/gpg-wrapper.sh"
          chmod +x "$HOME/gpg-wrapper.sh"
          dpkg-buildpackage -S -sa -d \
            -k22EE8C9BEC025F3F0ADBC17289CF049935855E1E \
            -p"$HOME/gpg-wrapper.sh"
          gpg --verify ../scrolllock-led-daemon_*_source.changes

      - name: Upload source package to Launchpad PPA
        if: env.GPG_PRIVATE_KEY != '' && env.LAUNCHPAD_KEY != ''
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          LAUNCHPAD_KEY: ${{ secrets.LAUNCHPAD_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$LAUNCHPAD_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ppa.launchpad.net >> ~/.ssh/known_hosts
          dput ppa:alan-n7x/tools ../scrolllock-led-daemon_*_source.changes

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: scrolllock-led-daemon ${{ github.ref_name }}
          body: |
            ## scrolllock-led-daemon ${{ github.ref_name }}

            ### Downloads
            - Python package (PyPI): `pip install scrolllock-led-daemon`
            - `.deb` package attached below for Debian/Ubuntu
            - PPA: `sudo add-apt-repository ppa:alan-n7x/tools`

            ### Installation via .deb
            ```bash
            sudo dpkg -i scrolllock-led-daemon_*.deb
            sudo apt install -f
            ```

            ### Installation via PPA
            ```bash
            sudo add-apt-repository ppa:alan-n7x/tools
            sudo apt update
            sudo apt install scrolllock-led-daemon
            ```

            ### Changelog
            See [commits](https://github.com/alan-n7x/scrolllock-led-daemon/commits/${{ github.ref_name }}) for full changelog.
          files: |
            ../*.deb
            dist/*.whl
            dist/*.tar.gz
          fail_on_unmatched_files: false
