name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential debhelper dh-python python3-all python3-setuptools dh-sequence-bash-completion devscripts

      - name: Build PyPI package
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        if: env.PYPI_TOKEN != ''
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

      - name: Build .deb package (binary)
        run: |
          dpkg-buildpackage -us -uc -b

      - name: Build Debian source package (unsigned)
        run: |
          dpkg-buildpackage -S -sa -us -uc
        continue-on-error: true

      - name: Import GPG key for signing
        if: env.GPG_KEY != ''
        env:
          GPG_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --import --batch --yes
          echo "${{ secrets.GPG_PASSPHRASE }}" | gpg --passphrase-fd 0 --pinentry-mode loopback --sign /dev/null 2>/dev/null || true

      - name: Build signed Debian source package
        if: env.GPG_KEY != '' && env.LAUNCHPAD_KEY != ''
        env:
          GPG_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          LAUNCHPAD_KEY: ${{ secrets.LAUNCHPAD_SSH_KEY }}
          GPG_TTY: /dev/null
        run: |
          rm -f ../scrolllock-led-daemon_*.dsc ../scrolllock-led-daemon_*.changes ../scrolllock-led-daemon_*.buildinfo
          dpkg-buildpackage -S -sa

      - name: Upload source package to Launchpad PPA
        if: env.GPG_KEY != '' && env.LAUNCHPAD_KEY != ''
        env:
          GPG_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          LAUNCHPAD_KEY: ${{ secrets.LAUNCHPAD_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LAUNCHPAD_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ppa.launchpad.net >> ~/.ssh/known_hosts
          echo "signing_key = 89CF049935855E1E" >> ~/.dput.cf
          dput ppa:alan-n7x/scrolllock-led-daemon ../scrolllock-led-daemon_*_source.changes
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: scrolllock-led-daemon ${{ github.ref_name }}
          body: |
            ## scrolllock-led-daemon ${{ github.ref_name }}

            ### Downloads
            - Python package (PyPI): `pip install scrolllock-led-daemon`
            - `.deb` package attached below for Debian/Ubuntu
            - PPA: `sudo add-apt-repository ppa:alan-n7x/scrolllock-led-daemon`

            ### Installation via .deb
            ```bash
            sudo dpkg -i scrolllock-led-daemon_*.deb
            sudo apt install -f
            ```

            ### Installation via PPA
            ```bash
            sudo add-apt-repository ppa:alan-n7x/scrolllock-led-daemon
            sudo apt update
            sudo apt install scrolllock-led-daemon
            ```

            ### Changelog
            See [commits](https://github.com/alan-n7x/scrolllock-led-daemon/commits/${{ github.ref_name }}) for full changelog.
          files: |
            ../*.deb
            dist/*.whl
            dist/*.tar.gz
          fail_on_unmatched_files: false
