name: Release to Launchpad PPA (Imutável & Verificável)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'      # Tags como v1.0.0, v2.0
      - '*.*.*'   # Tags sem prefixo v (1.0.0)

jobs:
  build-and-verifiy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Essencial para OIDC com Sigstore
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # CRÍTICO: Preserva histórico completo para git archive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Debian packaging tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            bash-completion \
            debhelper \
            devscripts \
            dh-python \
            dh-sequence-bash-completion \
            dput \
            python3-all \
            python3-setuptools

      - name: Install cosign & syft (Sigstore tooling)
        run: |
          curl -fsSL \
            https://github.com/sigstore/cosign/releases/download/v2.2.2/cosign-linux-amd64 \
            -o "$RUNNER_TEMP/cosign"
          sudo install -m 0755 "$RUNNER_TEMP/cosign" /usr/local/bin/cosign

          curl -fsSL \
            https://github.com/anchore/syft/releases/download/v0.80.0/syft_0.80.0_linux_amd64.tar.gz \
            -o "$RUNNER_TEMP/syft.tar.gz"
          tar xzf "$RUNNER_TEMP/syft.tar.gz" -C "$RUNNER_TEMP" syft
          sudo install -m 0755 "$RUNNER_TEMP/syft" /usr/local/bin/syft

      - name: Extract version from tag
        id: version
        run: |
          # Remove prefix 'v' se existir (ex: v1.0.14 -> 1.0.14)
          VERSION=${GITHUB_REF#refs/tags/v}
          VERSION=${VERSION#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detectada versão: $VERSION"

      - name: Verify version consistency (crítica para reproducibilidade)
        run: |
          # Extrai versão de 3 fontes para garantir consistência
          PYPA_VERSION=$(grep -E '^version =' pyproject.toml | cut -d'"' -f2)
          DEB_VERSION=$(dpkg-parsechangelog -l debian/changelog -S Version | sed 's/-.*//')
          TAG_VERSION="${{ steps.version.outputs.version }}"

          echo "pyproject.toml: $PYPA_VERSION"
          echo "debian/changelog: $DEB_VERSION"
          echo "Git tag: $TAG_VERSION"

          # Falha se houver inconsistência (prevents "works on my machine" syndrome)
          if [ "$PYPA_VERSION" != "$TAG_VERSION" ] || [ "$DEB_VERSION" != "$TAG_VERSION" ]; then
            echo "::error ::VERSÃO DESCORDENADA! Corrija:"
            echo "  pyproject.toml: $PYPA_VERSION"
            echo "  debian/changelog: $DEB_VERSION"
            echo "  Git tag: $TAG_VERSION"
            exit 1
          fi

      - name: Create immutable upstream tarball and separate SBOM
        id: tarball
        run: |
          VERSION=${{ steps.version.outputs.version }}
          TARBALL="../scrolllock-led-daemon_${VERSION}.orig.tar.gz"
          SBOM="../scrolllock-led-daemon_${VERSION}.sbom.spdx.json"

          # dpkg-source expects the upstream tarball in the parent directory.
          git archive \
            --format=tar.gz \
            --prefix=scrolllock-led-daemon-$VERSION/ \
            -o "$TARBALL" \
            ${{ github.sha }}

          # The SBOM remains separate so it cannot invalidate Debian signatures.
          syft dir:. -o spdx-json > "$SBOM"

          echo "tarball_path=$TARBALL" >> "$GITHUB_OUTPUT"
          echo "sbom_path=$SBOM" >> "$GITHUB_OUTPUT"
          echo "tarball_sha256=$(sha256sum "$TARBALL" | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Import Launchpad GPG signing key
        id: gpg
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "::error::The GPG_PRIVATE_KEY repository secret is not configured."
            exit 1
          fi

          mkdir -p "$HOME/.gnupg"
          chmod 700 "$HOME/.gnupg"
          printf '%s\n' 'allow-loopback-pinentry' > "$HOME/.gnupg/gpg-agent.conf"
          printf '%s\n' 'pinentry-mode loopback' > "$HOME/.gnupg/gpg.conf"
          gpgconf --kill gpg-agent

          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import
          KEY_FINGERPRINT=$(gpg --batch --with-colons --list-secret-keys \
            | awk -F: '$1 == "fpr" { print $10; exit }')

          if [ -z "$KEY_FINGERPRINT" ]; then
            echo "::error::No secret GPG key was imported."
            exit 1
          fi

          echo "fingerprint=$KEY_FINGERPRINT" >> "$GITHUB_OUTPUT"
          echo "Imported GPG signing key: $KEY_FINGERPRINT"

      - name: Build and GPG-sign source package
        id: build
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          chmod +x scripts/gpg-ci-wrapper.sh

          SIGN_TEST="$RUNNER_TEMP/gpg-sign-test"
          printf '%s\n' 'Launchpad signing test' > "$SIGN_TEST"
          if ! scripts/gpg-ci-wrapper.sh \
            --local-user "${{ steps.gpg.outputs.fingerprint }}" \
            --detach-sign \
            --output "${SIGN_TEST}.sig" \
            "$SIGN_TEST"; then
            echo "::error::The imported GPG key could not sign non-interactively. If the key is protected, configure the GPG_PASSPHRASE secret."
            exit 1
          fi

          dpkg-buildpackage \
            -S \
            -d \
            -sa \
            --sign-backend=gpg \
            -k"${{ steps.gpg.outputs.fingerprint }}" \
            -p"$GITHUB_WORKSPACE/scripts/gpg-ci-wrapper.sh"

          mapfile -t changes_files < <(
            find .. -maxdepth 1 -type f \
              -name 'scrolllock-led-daemon_*_source.changes' -print
          )
          if [ "${#changes_files[@]}" -ne 1 ]; then
            echo "::error::Expected one signed source .changes file, found ${#changes_files[@]}."
            exit 1
          fi

          CHANGES_FILE=$(realpath "${changes_files[0]}")
          gpg --batch --verify "$CHANGES_FILE"
          echo "changes_file=$CHANGES_FILE" >> "$GITHUB_OUTPUT"

      - name: Attest signed source upload with Sigstore
        id: attest
        run: |
          CHANGES_FILE="${{ steps.build.outputs.changes_file }}"

          COSIGN_EXPERIMENTAL=1 cosign sign-blob \
            --yes \
            --output-signature="${CHANGES_FILE}.sig" \
            --output-certificate="${CHANGES_FILE}.crt" \
            "$CHANGES_FILE"

          echo "attestation_file=$CHANGES_FILE" >> $GITHUB_OUTPUT
          echo "✅ Sigstore attestation generated separately from the Debian upload"

      - name: Verify attestation before upload (defesa em profundidade)
        run: |
          CHANGES_FILE="${{ steps.build.outputs.changes_file }}"

          COSIGN_EXPERIMENTAL=1 cosign verify-blob \
            --certificate="${CHANGES_FILE}.crt" \
            --signature="${CHANGES_FILE}.sig" \
            --certificate-identity-regexp='^https://github.com/alan-n7x/scrolllock-led-daemon/.github/workflows/release.yml@refs/tags/.+$' \
            --certificate-oidc-issuer='https://token.actions.githubusercontent.com' \
            "$CHANGES_FILE"

          echo "✅ Attestation verificado com sucesso - pronto para upload"

      - name: Upload to Launchpad PPA
        env:
          LP_LAUNCHPAD_ID: ${{ secrets.LP_LAUNCHPAD_ID }}
        run: |
          CHANGES_FILE="${{ steps.build.outputs.changes_file }}"

          if [ -z "$LP_LAUNCHPAD_ID" ]; then
            echo "::error::The LP_LAUNCHPAD_ID repository secret is not configured."
            exit 1
          fi

          dput "ppa:${LP_LAUNCHPAD_ID}/tools" "$CHANGES_FILE"

          echo "✅ Upload concluído para Launchpad PPA: ~${LP_LAUNCHPAD_ID}/tools"
          echo "🔗 Acompanhe o build em: https://launchpad.net/~${LP_LAUNCHPAD_ID}/+archive/ubuntu/tools"

      - name: Collect release artifacts
        if: always() && steps.build.outputs.changes_file != ''
        run: |
          mkdir -p release-artifacts
          find .. -maxdepth 1 -type f \
            -name 'scrolllock-led-daemon_${{ steps.version.outputs.version }}*' \
            -exec cp --target-directory=release-artifacts {} +

      - name: Upload source, SBOM, and attestations as workflow artifacts
        if: always() && steps.build.outputs.changes_file != ''
        uses: actions/upload-artifact@v4
        with:
          name: launchpad-source-${{ steps.version.outputs.version }}
          path: release-artifacts/
          if-no-files-found: error

      - name: Cleanup (optional)
        if: always()
        run: |
          # Remove arquivos de build para não poluir o workspace do runner
          rm -rf ../scrolllock-led-daemon_*.{dsc,tar.gz,changes,buildinfo,deb} \
                 debian/*.debhelper debian/substvars \
                 build/ dist/ release-artifacts/ *.egg-info .pytest_cache .coverage
          echo "🧹 Limpeza concluída"
