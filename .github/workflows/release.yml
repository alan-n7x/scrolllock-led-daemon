name: Release to Launchpad PPA (Imutável & Verificável)

on:
  push:
    tags:
      - 'v*'      # Tags como v1.0.0, v2.0
      - '*.*.*'   # Tags sem prefixo v (1.0.0)

jobs:
  build-and-verifiy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Essencial para OIDC com Sigstore
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # CRÍTICO: Preserva histórico completo para git archive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install cosign & syft (Sigstore tooling)
        run: |
          # Instala cosign (assinatura keyless) e syft (SBOM generator)
          curl -sSL https://github.com/sigstore/cosign/releases/download/v2.2.2/cosign-linux-amd64 -o /usr/local/bin/cosign
          chmod +x /usr/local/bin/cosign
          curl -sSL https://github.com/anchore/syft/releases/download/v0.80.0/syft_0.80.0_linux_amd64.tar.gz | \
            tar xz -C /usr/local/bin syft
          chmod +x /usr/local/bin/syft

      - name: Extract version from tag
        id: version
        run: |
          # Remove prefix 'v' se existir (ex: v1.0.14 -> 1.0.14)
          VERSION=${GITHUB_REF#refs/tags/v}
          VERSION=${VERSION#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detectada versão: $VERSION"

      - name: Verify version consistency (crítica para reproducibilidade)
        run: |
          # Extrai versão de 3 fontes para garantir consistência
          PYPA_VERSION=$(grep -E '^version =' pyproject.toml | cut -d'"' -f2)
          DEB_VERSION=$(dpkg-parsechangelog -s debian/changelog -S Version | sed 's/-.*//')
          TAG_VERSION="${{ steps.version.outputs.version }}"

          echo "pyproject.toml: $PYPA_VERSION"
          echo "debian/changelog: $DEB_VERSION"
          echo "Git tag: $TAG_VERSION"

          # Falha se houver inconsistência (prevents "works on my machine" syndrome)
          if [ "$PYPA_VERSION" != "$TAG_VERSION" ] || [ "$DEB_VERSION" != "$TAG_VERSION" ]; then
            echo "::error ::VERSÃO DESCORDENADA! Corrija:"
            echo "  pyproject.toml: $PYPA_VERSION"
            echo "  debian/changelog: $DEB_VERSION"
            echo "  Git tag: $TAG_VERSION"
            exit 1
          fi

      - name: Create immutable upstream tarball with embedded SBOM
        id: tarball
        run: |
          VERSION=${{ steps.version.outputs.version }}
          # Usa o commit EXATO da tag (não o working directory) para garantbitílde reproduzibilidade
          git archive \
            --format=tar.gz \
            --prefix=scrolllock-led-daemon-$VERSION/ \
            -o scrolllock-led-daemon_$VERSION.orig.tar.gz \
            ${{ github.sha }}

          # Gera SBOM (Software Bill of Materials) - RESOLVE SEU PROBLEMA DE "TARBALL AUSENTE"
          # Isso cria uma lista verificável de todas as dependências embutida no tarball
          sbom_file="sbom-${VERSION}.spdx.json"
          syft scan dir:./ -o spdx-json > $sbom_file

          # Embute o SBOM no tarball (padrão de facto para supply chain security)
          tar -rf scrolllock-led-daemon_$VERSION.orig.tar.gz \
            --transform="s,^,scrolllock-led-daemon-$VERSION/," \
            $sbom_file
          rm $sbom_file

          echo "tarball_path=scrolllock-led-daemon_$VERSION.orig.tar.gz" >> $GITHUB_OUTPUT
          echo "sbom_sha256=$(sha256sum scrolllock-led-daemon_$VERSION.orig.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "✅ Tarball criado com SBOM embutido: $GITHUB_OUTPUT"

      - name: Build source package (reprodutível e limpo)
        run: |
          cd scrolllock-led-daemon
          # -S: source package only
          # -us -uc: não assinar ainda (assinarémos com Sigstore depois)
          # -d: ignore build-deps (útil para CI)
          # -B .: evita problemas com diretório de build temporário
          dpkg-buildpackage -S -us -uc -d -B .

      - name: Attest build with Sigstore (RESOLVE SEU PROBLEMA DE GPG BATCHMODE!)
        id: attest
        run: |
          VERSION=${{ steps.version.outputs.version }}
          CHANGES_FILE="../scrolllock-led-daemon_${VERSION}.source.changes"

          # Gera attestation criptográfica USANDO OIDC (NENHUMA CHAVE PRIVADA NO CI!)
          # Isso usa a identidade do GitHub Actions via OIDC - nenhuma chave necessária
          COSIGN_EXPERIMENTAL=1 cosign sign-blob \
            --yes \
            --output-signature="${CHANGES_FILE}.sig" \
            --output-cert="${CHANGES_FILE}.crt" \
            --yes \
            < "$CHANGES_FILE"

          # Formato personalizado para anexar attestation ao .changes (compatível com Debian)
          {
            echo ""
            echo "Format: 1.8"
            echo "Attestation: cosign"
            echo "Attestation-Signature: $(base64 -w0 ${CHANGES_FILE}.sig)"
            echo "Attestation-Certificate: $(base64 -w0 ${CHANGES_FILE}.crt)"
          } >> "$CHANGES_FILE"

          echo "attestation_file=$CHANGES_FILE" >> $GITHUB_OUTPUT
          echo "✅ Attestation gerado e anexado ao .changes"

      - name: Verify attestation before upload (defesa em profundidade)
        run: |
          VERSION=${{ steps.version.outputs.version }}
          CHANGES_FILE="../scrolllock-led-daemon_${VERSION}.source.changes"

          # Verifica a attestation ANTES do upload - garante que não foi adulterado
          COSIGN_EXPERIMENTAL=1 cosign verify-blob \
            --key="${CHANGES_FILE}.crt" \
            --signature="${CHANGES_FILE}.sig" \
            < "$CHANGES_FILE"

          echo "✅ Attestation verificado com sucesso - pronto para upload"

      - name: Upload to Launchpad PPA
        run: |
          VERSION=${{ steps.version.outputs.version }}
          CHANGES_FILE="../scrolllock-led-daemon_${VERSION}.source.changes"

          # Configura dput para Launchpad (usa credenciais padrões do sistema)
          # Você PRECISA ter configurado ~/.dput.cf manualmente uma vez (veja instruções abaixo)
          dput ppa:~${{ secrets.LP_LAUNCHPAD_ID }}/ppa "$CHANGES_FILE"

          echo "✅ Upload concluído para Launchpad PPA: ~${{ secrets.LP_LAUNCHPAD_ID }}/ppa"
          echo "🔗 Acompanhe o build em: https://launchpad.net/~${{ secrets.LP_LAUNCHPAD_ID }}/+archive/ubuntu/ppa"

      - name: Cleanup (optional)
        if: always()
        run: |
          # Remove arquivos de build para não poluir o workspace do runner
          rm -rf ../scrolllock-led-daemon_*.{dsc,tar.gz,changes,buildinfo,deb} \
                 debian/*.debhelper debian/substvars \
                 build/ dist/ *.egg-info .pytest_cache .coverage
          echo "🧹 Limpeza concluída"